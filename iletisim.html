    <header class="bg-dark text-white text-center py-5 shadow">
      <div class="container">
        <h1 class="display-4">İletişim Formu</h1>
        <p class="lead">
          Proje, staj veya iş birliği fikirleri için mesaj bırakabilirsiniz.
        </p>
      </div>
    </header>

    <main class="container my-5 flex-grow-1">
      <section class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow border-0 p-4 p-md-5">
            <h3 class="mb-4 text-primary border-bottom pb-2">İletişim Formu</h3>

            <div
              id="hataKutusu"
              class="alert alert-danger d-none"
              role="alert"
            ></div>

            <form id="app" action="sonuc.php" method="POST">
              <div class="row mb-3">
                <div class="col-md-6">
                  <label for="ad" class="form-label">Adınız</label>
                  <input
                    type="text"
                    class="form-control"
                    id="ad"
                    name="ad"
                    v-model="ad"
                    placeholder="Örn: Abdulrahman"
                  />
                </div>
                <div class="col-md-6 mt-3 mt-md-0">
                  <label for="soyad" class="form-label">Soyadınız</label>
                  <input
                    type="text"
                    class="form-control"
                    id="soyad"
                    name="soyad"
                    v-model="soyad"
                    placeholder="Örn: Hasırcı"
                  />
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label for="email" class="form-label"
                    >E-posta Adresiniz</label
                  >
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    v-model="email"
                    placeholder="ornek@sakarya.edu.tr"
                  />
                </div>
                <div class="col-md-6 mt-3 mt-md-0">
                  <label for="telefon" class="form-label"
                    >Telefon Numaranız</label
                  >
                  <input
                    type="tel"
                    class="form-control"
                    id="telefon"
                    name="telefon"
                    placeholder="05XX XXX XX XX"
                  />
                </div>
              </div>

              <div class="mb-3">
                <label for="konu" class="form-label">İletişim Konusu</label>
                <select class="form-select" id="konu" name="konu">
                  <option value="" selected disabled>
                    Lütfen bir konu seçin...
                  </option>
                  <option value="proje">Akademik Proje</option>
                  <option value="staj">Staj Başvurusu</option>
                  <option value="diger">Diğer</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label d-block"
                  >Size Nasıl Geri Dönüş Yapalım?</label
                >
                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="donusTipi"
                    id="radyoEmail"
                    value="E-posta"
                    checked
                  />
                  <label class="form-check-label" for="radyoEmail"
                    >E-posta ile</label
                  >
                </div>
                <div class="form-check form-check-inline">
                  <input
                    class="form-check-input"
                    type="radio"
                    name="donusTipi"
                    id="radyoTelefon"
                    value="Telefon"
                  />
                  <label class="form-check-label" for="radyoTelefon"
                    >Telefon ile</label
                  >
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label d-block">Beni Nereden Buldunuz?</label>
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="checkSosyal"
                    name="kaynak[]"
                    value="Sosyal Medya"
                  />
                  <label class="form-check-label" for="checkSosyal"
                    >Sosyal Medya (Instagram / LinkedIn)</label
                  >
                </div>
                <div class="form-check">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    id="checkOkul"
                    name="kaynak[]"
                    value="Sakarya Üniversitesi"
                  />
                  <label class="form-check-label" for="checkOkul"
                    >Sakarya Üniversitesi</label
                  >
                </div>
              </div>

              <div class="mb-4">
                <label for="mesaj" class="form-label">Mesajınız</label>
                <textarea
                  class="form-control"
                  id="mesaj"
                  name="mesaj"
                  v-model="mesaj"
                  rows="5"
                  placeholder="Lütfen mesajınızı buraya yazın..."
                ></textarea>
              </div>

              <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button type="reset" class="btn btn-outline-secondary me-md-2">
                  Formu Temizle
                </button>
                <button
                  type="button"
                  class="btn btn-warning px-4"
                  onclick="jsIleGonder()"
                >
                  JS ile Gönder
                </button>
                <button
                  type="button"
                  class="btn btn-success px-4"
                  @click="vueIleGonder"
                >
                  Vue ile Gönder
                </button>
              </div>
            </form>
          </div>
        </div>
      </section>

    <footer class="bg-dark text-white text-center py-3 mt-5">
      <p class="mb-0">2026 Web Teknolojileri Projesi | Abdulrahman Hasırcı</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      function jsIleGonder() {
        let ad = document.getElementById("ad").value.trim();
        let soyad = document.getElementById("soyad").value.trim();
        let email = document.getElementById("email").value.trim();
        let mesaj = document.getElementById("mesaj").value.trim();
        let hataKutusu = document.getElementById("hataKutusu");

        if (ad === "" || soyad === "") {
          hataKutusu.innerHTML =
            "<strong>JS Hatası!</strong> Lütfen ad ve soyad alanlarını doldurunuz.";
          hataKutusu.classList.remove("d-none");
          return;
        }

        let emailFormati = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email.match(emailFormati)) {
          hataKutusu.innerHTML =
            "<strong>JS Hatası!</strong> Lütfen geçerli bir e-posta adresi giriniz.";
          hataKutusu.classList.remove("d-none");
          return;
        }

        if (mesaj === "") {
          hataKutusu.innerHTML =
            "<strong>JS Hatası!</strong> Lütfen mesajınızı yazınız.";
          hataKutusu.classList.remove("d-none");
          return;
        }

        // Hata yoksa formu gönder
        hataKutusu.classList.add("d-none");
        alert("Native JS Kontrolü Başarılı! Form gönderiliyor...");
        document.getElementById("app").submit();
      }
    </script>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
      const { createApp } = Vue;

      createApp({
        data() {
          return {
            ad: "",
            soyad: "",
            email: "",
            mesaj: "",
          };
        },
        methods: {
          vueIleGonder() {
            // Vue.js üzerinden kontrol
            if (!this.ad || !this.soyad || !this.email || !this.mesaj) {
              alert(
                "Vue.js Uyarısı: Lütfen Ad, Soyad, E-posta ve Mesaj alanlarını doldurunuz!",
              );
            } else {
              alert("Vue.js Kontrolü Başarılı! Form gönderiliyor...");
              document.getElementById("app").submit();
            }
          },
        },
      }).mount("#app");
    </script>
