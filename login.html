    <!-- LOGİN FORMU -->
    <main class="container my-5 flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="card shadow border-0 p-4 p-md-5" style="width: 100%; max-width: 450px;">
            <div class="text-center mb-4">
                <h3 class="text-primary fw-bold">Yönetici Girişi</h3>
                <p class="text-muted">Lütfen okul e-postanız ve öğrenci numaranız ile giriş yapın.</p>
            </div>
            
            <!-- Hata Mesajı Kutusu -->
            <div id="hataKutusu" class="alert alert-danger d-none" role="alert"></div>

            <form action="login.php" method="POST" onsubmit="return loginKontrol()">
                <div class="mb-3">
                    <label for="email" class="form-label">Kullanıcı Adı (E-posta)</label>
                    <input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="b251210580@sakarya.edu.tr">
                </div>
                <div class="mb-4">
                    <label for="sifre" class="form-label">Şifre (Öğrenci No)</label>
                    <input type="password" class="form-control form-control-lg" id="sifre" name="sifre" placeholder="Şifrenizi giriniz">
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">Giriş Yap</button>
                </div>
            </form>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <p class="mb-0">&copy; 2026 Web Teknolojileri Projesi | Abdulrahman Hasırcı</p>

    <!-- BOOTSTRAP VE JAVASCRIPT KONTROLLERİ -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 1. PHP'den gelen hatalı giriş yönlendirmesini yakalama
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.get('durum') === 'hata') {
                let hataKutusu = document.getElementById('hataKutusu');
                hataKutusu.innerHTML = "<strong>Hatalı Giriş!</strong> Kullanıcı adı veya şifre yanlış.";
                hataKutusu.classList.remove('d-none');
            }
        };

        // 2. JavaScript ile Boş Alan ve Mail Formatı Kontrolü
        function loginKontrol() {
            let email = document.getElementById('email').value.trim();
            let sifre = document.getElementById('sifre').value.trim();
            let hataKutusu = document.getElementById('hataKutusu');

            // Boş alan kontrolü
            if (email === "" || sifre === "") {
                hataKutusu.innerHTML = "<strong>Hata!</strong> E-posta ve şifre alanları boş bırakılamaz.";
                hataKutusu.classList.remove('d-none');
                return false;
            }

            // Mail formatı kontrolü
            let emailFormati = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email.match(emailFormati)) {
                hataKutusu.innerHTML = "<strong>Hata!</strong> Lütfen geçerli bir e-posta adresi giriniz.";
                hataKutusu.classList.remove('d-none');
                return false;
            }

            hataKutusu.classList.add('d-none');
            return true;
        }
    </script>
</body>
